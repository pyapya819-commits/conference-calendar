<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viatris 학회 일정 캘린더</title>
<style>
  :root {
    --purple: #5B2D8E;
    --purple-dark: #3D1A6B;
    --purple-light: #7B4DB5;
    --purple-pale: #F0EAF8;
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --white: #FFFFFF;
    --gray-50: #F8F8F8;
    --gray-100: #F0F0F0;
    --gray-200: #E0E0E0;
    --gray-400: #9E9E9E;
    --gray-600: #666666;
    --gray-800: #333333;
    --text: #1A1A2E;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(91,45,142,0.10);
    --shadow-md: 0 4px 24px rgba(91,45,142,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--gray-50);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple) 60%, var(--purple-light) 100%);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(61,26,107,0.25);
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto;
    padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-badge {
    background: var(--gold); color: var(--purple-dark);
    font-weight: 700; font-size: 12px;
    padding: 4px 10px; border-radius: 20px;
  }
  .header-title { color: var(--white); font-size: 18px; font-weight: 600; }
  .header-title span { color: var(--gold-light); }
  .header-meta { color: rgba(255,255,255,0.7); font-size: 12px; text-align: right; line-height: 1.6; }
  .header-meta strong { color: var(--gold-light); font-weight: 600; }
  .main { max-width: 1200px; margin: 0 auto; padding: 24px 32px 60px; }

  /* Stats */
  .stats-bar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .stat-card {
    background: var(--white); border-radius: var(--radius);
    padding: 10px 16px; box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 8px; flex: 1; min-width: 100px;
  }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--purple-dark); }
  .stat-label { font-size: 11px; color: var(--gray-600); font-weight: 500; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Controls */
  .controls { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .view-tabs {
    display: flex; background: var(--white);
    border: 1.5px solid var(--purple-pale); border-radius: var(--radius); overflow: hidden;
  }
  .view-tab {
    padding: 7px 18px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; background: none; color: var(--gray-600);
  }
  .view-tab.active { background: var(--purple); color: var(--white); }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid var(--gray-200); background: var(--white);
    font-size: 12px; font-weight: 500; cursor: pointer; color: var(--gray-600);
  }
  .filter-btn.active { background: var(--purple); border-color: var(--purple); color: var(--white); }
  .filter-btn.cv.active { background: #5B2D8E; border-color: #5B2D8E; }
  .filter-btn.pain.active { background: #C9A84C; border-color: #C9A84C; color: #fff; }
  .filter-btn.domestic.active { background: #388E3C; border-color: #388E3C; }
  .filter-btn.intl.active { background: #E64A19; border-color: #E64A19; }
  .update-info { margin-left: auto; font-size: 11px; color: var(--gray-400); white-space: nowrap; }
  .update-info span { color: var(--purple); font-weight: 600; }

  /* Calendar */
  .cal-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; }
  .cal-nav button {
    background: var(--white); border: 1.5px solid var(--gray-200);
    border-radius: 8px; width: 34px; height: 34px;
    font-size: 16px; cursor: pointer; color: var(--purple);
    display: flex; align-items: center; justify-content: center;
  }
  .cal-nav button:hover { background: var(--purple); color: var(--white); border-color: var(--purple); }
  .cal-month { font-size: 20px; font-weight: 700; color: var(--purple-dark); min-width: 140px; text-align: center; }
  .calendar-grid { background: var(--white); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
  .cal-header-row { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--purple); }
  .cal-header-cell {
    text-align: center; padding: 10px 4px;
    font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.85);
  }
  .cal-header-cell:first-child { color: #FFB3B3; }
  .cal-header-cell:last-child { color: #B3D9FF; }
  .cal-body { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); border-left: 1px solid var(--gray-100); border-top: 1px solid var(--gray-100); }
  .cal-cell {
    min-height: 100px;
    border-right: 1px solid var(--gray-100);
    border-bottom: 1px solid var(--gray-100);
    padding: 6px 4px 4px;
    overflow: hidden;
  }
  .cal-cell:hover { background: var(--purple-pale); }
  .cal-cell.other-month { background: var(--gray-50); }
  .cal-cell.other-month .cal-date { color: var(--gray-400); }
  .cal-cell.today .cal-date {
    background: var(--gold); color: var(--purple-dark);
    border-radius: 50%; font-weight: 700;
  }
  .cal-date {
    font-size: 12px; font-weight: 600; color: var(--gray-800);
    margin-bottom: 3px;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-cell:nth-child(7n+1) .cal-date { color: #D32F2F; }
  .cal-cell:nth-child(7n) .cal-date { color: #1565C0; }
  .cal-event {
    font-size: 10px; font-weight: 500;
    padding: 2px 5px; border-radius: 3px;
    margin-bottom: 2px; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 100%; display: block;
  }
  .cal-event:hover { opacity: 0.8; }
  .cal-event.cv { background: #EDE7F6; color: #4527A0; }
  .cal-event.pain { background: #FFF8E1; color: #E65100; border-left: 2px solid var(--gold); }
  .cal-event.intl { border-left: 2px solid #E64A19 !important; }
  .cal-more {
    font-size: 10px; color: var(--purple); font-weight: 600;
    cursor: pointer; padding: 1px 4px;
    background: var(--purple-pale); border-radius: 3px;
    display: inline-block; margin-top: 1px;
  }
  .cal-more:hover { background: var(--purple); color: white; }

  /* List View */
  .list-group { margin-bottom: 28px; }
  .list-month-header {
    font-size: 15px; font-weight: 700; color: var(--purple-dark);
    padding: 8px 0 10px;
    border-bottom: 2px solid var(--purple-pale);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .list-month-header::before {
    content: ''; display: inline-block;
    width: 4px; height: 16px;
    background: var(--gold); border-radius: 2px;
  }
  .list-card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 18px;
    margin-bottom: 8px; display: flex; gap: 14px;
    align-items: flex-start; cursor: pointer;
    border-left: 4px solid transparent;
    transition: box-shadow 0.15s, transform 0.1s;
  }
  .list-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .list-card.cv { border-left-color: var(--purple); }
  .list-card.pain { border-left-color: var(--gold); }
  .list-date-block {
    min-width: 58px; text-align: center;
    background: var(--purple-pale); border-radius: 8px; padding: 6px 4px;
  }
  .list-date-month { font-size: 10px; font-weight: 600; color: var(--purple); }
  .list-date-day { font-size: 20px; font-weight: 700; color: var(--purple-dark); line-height: 1.2; }
  .list-date-end { font-size: 10px; color: var(--gray-400); margin-top: 1px; }
  .list-info { flex: 1; min-width: 0; }
  .list-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 5px; line-height: 1.4; }
  .list-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
  .tag.cv { background: #EDE7F6; color: #4527A0; }
  .tag.pain { background: #FFF8E1; color: #E65100; }
  .tag.domestic { background: #E8F5E9; color: #2E7D32; }
  .tag.intl { background: #FBE9E7; color: #BF360C; }
  .list-meta-item { font-size: 11px; color: var(--gray-600); }
  .list-link {
    font-size: 11px; color: var(--purple); text-decoration: none;
    font-weight: 500; margin-top: 5px; display: inline-block;
  }
  .list-link:hover { text-decoration: underline; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 999;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 16px;
    padding: 24px 28px; max-width: 440px; width: 90%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2); position: relative;
  }
  .modal-close {
    position: absolute; top: 14px; right: 14px;
    background: none; border: none; font-size: 20px;
    cursor: pointer; color: var(--gray-400);
  }
  .modal-tag-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--purple-dark); margin-bottom: 14px; line-height: 1.4; }
  .modal-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; font-size: 13px; color: var(--gray-600); }
  .modal-link {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 14px; background: var(--purple); color: var(--white);
    padding: 9px 18px; border-radius: 8px; text-decoration: none;
    font-size: 13px; font-weight: 600;
  }
  .modal-link:hover { background: var(--purple-dark); }

  /* More modal */
  .more-modal {
    background: var(--white); border-radius: 16px;
    padding: 20px 24px; max-width: 360px; width: 90%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2); position: relative;
    max-height: 80vh; overflow-y: auto;
  }
  .more-modal-title { font-size: 14px; font-weight: 700; color: var(--purple-dark); margin-bottom: 12px; }
  .more-modal-item {
    padding: 8px 10px; border-radius: 8px; margin-bottom: 6px;
    cursor: pointer; border-left: 3px solid transparent;
    font-size: 13px; font-weight: 500;
  }
  .more-modal-item:hover { background: var(--purple-pale); }
  .more-modal-item.cv { border-left-color: var(--purple); background: #FAF7FF; }
  .more-modal-item.pain { border-left-color: var(--gold); background: #FFFDF5; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-400); font-size: 14px; }

  @media (max-width: 768px) {
    .main { padding: 12px; }
    .header-inner { padding: 12px 16px; }
    .cal-cell { min-height: 60px; }
    .cal-event { font-size: 9px; }
    .stats-bar { gap: 6px; }
    .stat-card { padding: 8px 12px; min-width: 80px; }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo-area">
      <span class="logo-badge">VIATRIS</span>
      <h1 class="header-title">학회 일정 <span>캘린더</span></h1>
    </div>
    <div class="header-meta">
      <div>CV · Pain</div>
      <div><strong id="total-count">--</strong>개 학회 일정</div>
    </div>
  </div>
</header>

<div class="main">
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-dot" style="background:#5B2D8E"></div><div><div class="stat-num" id="stat-cv">--</div><div class="stat-label">CV</div></div></div>
    <div class="stat-card"><div class="stat-dot" style="background:#C9A84C"></div><div><div class="stat-num" id="stat-pain">--</div><div class="stat-label">Pain</div></div></div>
    <div class="stat-card"><div class="stat-dot" style="background:#388E3C"></div><div><div class="stat-num" id="stat-domestic">--</div><div class="stat-label">국내</div></div></div>
    <div class="stat-card"><div class="stat-dot" style="background:#E64A19"></div><div><div class="stat-num" id="stat-intl">--</div><div class="stat-label">국제</div></div></div>
  </div>

  <div class="controls">
    <div class="view-tabs">
      <button class="view-tab active" onclick="switchView('calendar', this)">📅 달력</button>
      <button class="view-tab" onclick="switchView('list', this)">☰ 리스트</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn cv" onclick="setFilter('cv', this)">CV</button>
      <button class="filter-btn pain" onclick="setFilter('pain', this)">Pain</button>
      <button class="filter-btn domestic" onclick="setFilter('domestic', this)">국내</button>
      <button class="filter-btn intl" onclick="setFilter('intl', this)">국제</button>
    </div>
    <div class="update-info">업데이트: <span id="last-updated">--</span></div>
  </div>

  <div id="calendar-section">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <div class="cal-month" id="cal-month-label"></div>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="calendar-grid">
      <div class="cal-header-row">
        <div class="cal-header-cell">일</div>
        <div class="cal-header-cell">월</div>
        <div class="cal-header-cell">화</div>
        <div class="cal-header-cell">수</div>
        <div class="cal-header-cell">목</div>
        <div class="cal-header-cell">금</div>
        <div class="cal-header-cell">토</div>
      </div>
      <div class="cal-body" id="cal-body"></div>
    </div>
  </div>

  <div id="list-section" style="display:none"></div>
</div>

<!-- 이벤트 상세 모달 -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">✕</button>
    <div class="modal-tag-row" id="modal-tags"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-row" id="modal-date"><span>📅</span><span></span></div>
    <div class="modal-row" id="modal-location"><span>📍</span><span></span></div>
    <div class="modal-row" id="modal-source"><span>🏥</span><span></span></div>
    <div id="modal-link-wrap"></div>
  </div>
</div>

<!-- +N개 더 모달 -->
<div class="modal-overlay" id="more-overlay" onclick="closeMoreModal(event)">
  <div class="more-modal">
    <button class="modal-close" onclick="document.getElementById('more-overlay').classList.remove('open')">✕</button>
    <div class="more-modal-title" id="more-modal-title"></div>
    <div id="more-modal-list"></div>
  </div>
</div>

<script>
let allConferences = [];
let activeFilter = 'all';
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();

function cleanName(name) {
  if (!name) return '';
  name = name.replace(/^(국내|국외|국제)\s*\d{1,2}월\s*\d{1,2}일?\(.+?\)\s*/g, '');
  name = name.replace(/^\d{4}년\s+/, '');
  name = name.replace(/\+\s*자세히\s*보기.*$/g, '').trim();
  name = name.replace(/\s*장소\s*[:：].+$/, '').trim();
  name = name.replace(/\s{2,}/g, ' ').trim();
  return name;
}

async function loadData() {
  try {
    const res = await fetch('data/conferences.json');
    const data = await res.json();
    allConferences = (data.conferences || []).map(c => ({
      ...c,
      name: cleanName(c.name),
      category: c.category === 'endo' ? 'cv' : c.category
    })).filter(c => c.name.length > 2);
    document.getElementById('last-updated').textContent = data.last_updated || '-';
  } catch(e) {
    allConferences = getSampleData();
    document.getElementById('last-updated').textContent = '샘플';
  }
  updateStats();
  renderCalendar();
  renderList();
}

function getSampleData() {
  return [
    { name:'대한고혈압학회 제64회 춘계학술대회', start:'2026-05-22', end:'2026-05-23', location:'광주 김대중컨벤션센터', category:'cv', type:'domestic', source:'대한고혈압학회', url:'https://www.koreanhypertension.org' },
    { name:'ESH 2026 (유럽고혈압학회)', start:'2026-05-28', end:'2026-05-31', location:'유럽', category:'cv', type:'intl', source:'대한고혈압학회', url:'https://eshannualmeetings.eu' },
    { name:'대한당뇨병학회 제39차 춘계학술대회', start:'2026-04-30', end:'2026-05-02', location:'광주 김대중컨벤션센터', category:'cv', type:'domestic', source:'대한당뇨병학회', url:'https://www.diabetes.or.kr' },
    { name:'대한신경과학회 추계 전문의 평생교육', start:'2026-09-06', end:'2026-09-06', location:'충남대학교병원', category:'pain', type:'domestic', source:'대한신경과학회', url:'https://renew.neuro.or.kr' },
    { name:'KSN 2026 통합학술대회', start:'2026-09-12', end:'2026-09-13', location:'광주 컨벤션센터', category:'cv', type:'domestic', source:'대한신장학회', url:'https://www.ksn.or.kr' },
  ];
}

function getFiltered() {
  if (activeFilter === 'all') return allConferences;
  if (activeFilter === 'domestic') return allConferences.filter(c => c.type === 'domestic');
  if (activeFilter === 'intl') return allConferences.filter(c => c.type === 'intl');
  return allConferences.filter(c => c.category === activeFilter);
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCalendar();
  renderList();
}

function switchView(view, btn) {
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('calendar-section').style.display = view === 'calendar' ? 'block' : 'none';
  document.getElementById('list-section').style.display = view === 'list' ? 'block' : 'none';
}

function updateStats() {
  const data = allConferences;
  document.getElementById('total-count').textContent = data.length;
  document.getElementById('stat-cv').textContent = data.filter(c => c.category === 'cv').length;
  document.getElementById('stat-pain').textContent = data.filter(c => c.category === 'pain').length;
  document.getElementById('stat-domestic').textContent = data.filter(c => c.type === 'domestic').length;
  document.getElementById('stat-intl').textContent = data.filter(c => c.type === 'intl').length;
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function renderCalendar() {
  const year = currentYear, month = currentMonth;
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month-label').textContent = `${year}년 ${monthNames[month]}`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month+1, 0).getDate();
  const today = new Date();
  const filtered = getFiltered();

  function getEventsForDate(y, m, d) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return filtered.filter(c => c.start <= dateStr && c.end >= dateStr);
  }

  let html = '';
  let dayCount = 1;
  const prevMonthDays = new Date(year, month, 0).getDate();
  const totalCells = Math.ceil((firstDay + lastDate) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    let d, m2, y2, otherMonth = false;
    if (i < firstDay) {
      d = prevMonthDays - firstDay + i + 1; m2 = month - 1; y2 = year;
      if (m2 < 0) { m2 = 11; y2--; } otherMonth = true;
    } else if (dayCount > lastDate) {
      d = dayCount - lastDate; dayCount++; m2 = month + 1; y2 = year;
      if (m2 > 11) { m2 = 0; y2++; } otherMonth = true;
    } else { d = dayCount++; m2 = month; y2 = year; }

    const isToday = !otherMonth && d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
    const events = otherMonth ? [] : getEventsForDate(y2, m2, d);
    const maxShow = 2;

    html += `<div class="cal-cell${otherMonth?' other-month':''}${isToday?' today':''}">`;
    html += `<div class="cal-date">${d}</div>`;
    events.slice(0, maxShow).forEach(ev => {
      const safeEv = JSON.stringify(ev).replace(/'/g,"&#39;");
      html += `<div class="cal-event ${ev.category}${ev.type==='intl'?' intl':''}" onclick='openModal(${safeEv})' title="${ev.name}">${ev.name}</div>`;
    });
    if (events.length > maxShow) {
      const remaining = JSON.stringify(events).replace(/'/g,"&#39;");
      const dateLabel = `${month+1}월 ${d}일`;
      html += `<span class="cal-more" onclick='showMore(${remaining}, "${dateLabel}")'>+${events.length - maxShow}개 더</span>`;
    }
    html += `</div>`;
  }
  document.getElementById('cal-body').innerHTML = html;
}

function renderList() {
  const filtered = getFiltered().slice().sort((a,b) => a.start.localeCompare(b.start));
  const grouped = {};
  filtered.forEach(c => {
    const key = c.start.substring(0,7);
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(c);
  });

  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  let html = '';

  if (!Object.keys(grouped).length) {
    html = `<div class="empty-state">해당 조건의 학회 일정이 없습니다.</div>`;
  } else {
    Object.entries(grouped).sort().forEach(([key, events]) => {
      const [y, m] = key.split('-');
      html += `<div class="list-group"><div class="list-month-header">${y}년 ${monthNames[parseInt(m)-1]}</div>`;
      events.forEach(ev => {
        const sd = new Date(ev.start), ed = new Date(ev.end);
        const catLabel = ev.category === 'cv' ? 'CV' : 'Pain';
        const typeLabel = ev.type === 'domestic' ? '국내' : '국제';
        const safeEv = JSON.stringify(ev).replace(/'/g,"&#39;");
        html += `<div class="list-card ${ev.category}" onclick='openModal(${safeEv})'>
          <div class="list-date-block">
            <div class="list-date-month">${monthNames[sd.getMonth()]}</div>
            <div class="list-date-day">${sd.getDate()}</div>
            ${ev.start!==ev.end?`<div class="list-date-end">~${ed.getDate()}일</div>`:''}
          </div>
          <div class="list-info">
            <div class="list-name">${ev.name}</div>
            <div class="list-meta">
              <span class="tag ${ev.category}">${catLabel}</span>
              <span class="tag ${ev.type}">${typeLabel}</span>
              <span class="list-meta-item">📍 ${ev.location}</span>
              <span class="list-meta-item" style="color:var(--gray-400)">출처: ${ev.source}</span>
            </div>
            ${ev.url?`<a class="list-link" href="${ev.url}" target="_blank" onclick="event.stopPropagation()">공식 사이트 →</a>`:''}
          </div>
        </div>`;
      });
      html += `</div>`;
    });
  }
  document.getElementById('list-section').innerHTML = html;
}

function openModal(ev) {
  const catLabel = ev.category === 'cv' ? 'CV' : 'Pain';
  const typeLabel = ev.type === 'domestic' ? '국내' : '국제';
  document.getElementById('modal-tags').innerHTML = `
    <span class="tag ${ev.category}">${catLabel}</span>
    <span class="tag ${ev.type}">${typeLabel}</span>
  `;
  document.getElementById('modal-title').textContent = ev.name;
  const sd = new Date(ev.start), ed = new Date(ev.end);
  const dateStr = ev.start === ev.end
    ? `${sd.getFullYear()}년 ${sd.getMonth()+1}월 ${sd.getDate()}일`
    : `${sd.getFullYear()}년 ${sd.getMonth()+1}월 ${sd.getDate()}일 ~ ${ed.getMonth()+1}월 ${ed.getDate()}일`;
  document.getElementById('modal-date').querySelector('span:last-child').textContent = dateStr;
  document.getElementById('modal-location').querySelector('span:last-child').textContent = ev.location || '';
  document.getElementById('modal-source').querySelector('span:last-child').textContent = ev.source || '';
  document.getElementById('modal-link-wrap').innerHTML = ev.url
    ? `<a class="modal-link" href="${ev.url}" target="_blank">공식 사이트 방문 →</a>` : '';
  document.getElementById('modal-overlay').classList.add('open');
}

function showMore(events, dateLabel) {
  document.getElementById('more-modal-title').textContent = `${dateLabel} 학회 일정`;
  let html = '';
  events.forEach(ev => {
    const safeEv = JSON.stringify(ev).replace(/'/g,"&#39;");
    const catLabel = ev.category === 'cv' ? 'CV' : 'Pain';
    html += `<div class="more-modal-item ${ev.category}" onclick='openModalFromMore(${safeEv})'>
      <div style="font-weight:600;margin-bottom:2px">${ev.name}</div>
      <div style="font-size:11px;color:#666">📍 ${ev.location} · ${catLabel}</div>
    </div>`;
  });
  document.getElementById('more-modal-list').innerHTML = html;
  document.getElementById('more-overlay').classList.add('open');
}

function openModalFromMore(ev) {
  document.getElementById('more-overlay').classList.remove('open');
  setTimeout(() => openModal(ev), 100);
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

function closeMoreModal(e) {
  if (e.target === document.getElementById('more-overlay')) {
    document.getElementById('more-overlay').classList.remove('open');
  }
}

loadData();
</script>
</body>
</html>
