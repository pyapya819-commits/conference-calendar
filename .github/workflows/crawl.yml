name: 학회 일정 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install requests beautifulsoup4 lxml

      - name: 학회 일정 크롤링 실행
        run: python crawl.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add data/conferences.json
          git diff --staged --quiet || git commit -m "🏥 학회 일정 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
